<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="{{url_for('home')}}">GlovesOn</a>
        
        <div class="ms-auto d-flex align-items-center">
            {% if session.get('user_id') %}
                <a class="btn btn-sm btn-outline-secondary mx-3" href="{{ url_for('profile') }}">My Profile</a>
                <span class="text-secondary me-3">{{ session['username'] }}</span>
                <a href="{{ url_for('logout') }}" class="btn btn-sm btn-outline-danger">Logout</a>
            {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-sm btn-outline-light me-2">Login</a>
                <a href="{{ url_for('register') }}" class="btn btn-sm btn-light">Register</a>
            {% endif %}
        </div>
    </nav>

    
    <div class="container my-5">
        {%block content%}
        {%endblock%}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
